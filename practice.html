<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI練習チャット — AVANTIS AI Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="app-layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">AVANTIS</div>
      <div class="sidebar-title">🤖 AI Academy</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="avatarLetter">A</div>
      <div><div class="sidebar-user-name" id="userName">読み込み中...</div></div>
    </div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>ダッシュボード</a>
      <div class="nav-section">コース</div>
      <a href="lesson.html?id=lv1-l1" class="nav-item"><span class="nav-icon">🤖</span>Lv.1 AI入門編</a>
      <a href="lesson.html?id=lv2-l1" class="nav-item"><span class="nav-icon">✍️</span>Lv.2 プロンプト技術編</a>
      <a href="lesson.html?id=lv3-l1" class="nav-item"><span class="nav-icon">💻</span>Lv.3 Claude Code編</a>
      <a href="lesson.html?id=lv4-l1" class="nav-item"><span class="nav-icon">⚡</span>Lv.4 AIプログラミング編</a>
      <a href="lesson.html?id=lv5-l1" class="nav-item"><span class="nav-icon">🚀</span>Lv.5 一人起業レベル編</a>
    </div>
    <div class="sidebar-footer">
      <button class="nav-item" id="logoutBtn"><span class="nav-icon">🚪</span>ログアウト</button>
    </div>
  </nav>

  <div class="main-content">
    <header class="main-header">
      <button class="hamburger" id="hamburger">☰</button>
      <h2>🤖 AI練習チャット</h2>
      <button class="btn btn-secondary btn-sm" id="clearBtn">会話をリセット</button>
    </header>

    <div class="page-content" style="display:flex;flex-direction:column;height:calc(100vh - 64px);padding-bottom:16px">
      <div id="apiKeyAlert" style="display:none" class="alert alert-error">
        ⚠️ Claude APIキーが設定されていません。<a href="setup.html" style="color:inherit;font-weight:700">管理者設定</a>でAPIキーを登録してください。
      </div>

      <!-- コンテキストバー -->
      <div class="chat-context-bar" id="contextBar">
        <div class="chat-context-icon">📚</div>
        <div class="chat-context-info">
          <div class="chat-context-label">練習中のレッスン</div>
          <div class="chat-context-text" id="contextTitle">自由練習モード</div>
        </div>
        <a id="backToLesson" href="dashboard.html" class="btn btn-secondary btn-sm">← レッスンに戻る</a>
      </div>

      <!-- チャットウィンドウ -->
      <div class="chat-window" id="chatWindow">
        <div class="chat-empty" id="chatEmpty">
          <div class="icon">🤖</div>
          <p>AIに何でも聞いてみましょう！<br>このレッスンの内容について質問したり、<br>プロンプトの練習をしたりできます。</p>
          <div class="suggestion-chips" id="chips"></div>
        </div>
      </div>

      <!-- 入力エリア -->
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力... (Shift+Enterで改行)" rows="1"></textarea>
        <button class="chat-send" id="sendBtn" title="送信">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, logout } from './auth.js';
import { getApiKey } from './progress.js';
import { getLessonById } from './curriculum.js';

let currentUser, apiKey, systemPrompt;
let history = [];
const STORAGE_KEY = 'ai-academy-chat';

try {
  const r = await requireAuth();
  currentUser = r.user;
  const name = r.profile?.name || currentUser.email.split('@')[0];
  document.getElementById('userName').textContent = name;
  document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
} catch { window.location.href = 'index.html'; }

// APIキー取得
apiKey = await getApiKey();
if (!apiKey) {
  document.getElementById('apiKeyAlert').style.display = 'block';
}

// レッスンコンテキスト設定
const params = new URLSearchParams(location.search);
const lessonId = params.get('id');
const lesson = lessonId ? getLessonById(lessonId) : null;

if (lesson) {
  document.getElementById('contextTitle').textContent = lesson.title;
  document.getElementById('backToLesson').href = `lesson.html?id=${lessonId}`;
  systemPrompt = lesson.practiceContext;
  // 提案チップ
  const chips = [
    'このレッスンで最も重要なポイントを教えて',
    '初心者向けにもっとわかりやすく説明して',
    '実際のビジネスでの活用例を教えて',
    'よくある失敗パターンは？'
  ];
  document.getElementById('chips').innerHTML = chips.map(c =>
    `<button class="chip" data-text="${c}">${c}</button>`
  ).join('');
} else {
  systemPrompt = `あなたはAI・プログラミング・ビジネス全般に精通した優秀なアシスタントです。
合同会社AVANTISの代表・小島陸哉さんとそのスタッフをサポートします。
家計防衛FP・通信コスト削減・法人福利厚生・AI活用に詳しく、実践的なアドバイスができます。
日本語で丁寧かつ簡潔に回答してください。`;
  const chips = [
    '今日の業務でAIを使えそうなことは？',
    'プロンプトの書き方のコツを教えて',
    'Claude Codeの使い方を教えて',
    '事業成長のためのAI活用アイデアは？'
  ];
  document.getElementById('chips').innerHTML = chips.map(c =>
    `<button class="chip" data-text="${c}">${c}</button>`
  ).join('');
}

// チップクリック
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (chip) {
    document.getElementById('chatInput').value = chip.dataset.text;
    sendMessage();
  }
});

// UI要素
const chatWindow = document.getElementById('chatWindow');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const chatEmpty = document.getElementById('chatEmpty');

function addMessage(role, text) {
  chatEmpty.style.display = 'none';
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const isAI = role === 'ai';
  div.innerHTML = `
    <div class="msg-avatar ${isAI ? 'ai-av' : 'user-av'}">${isAI ? '🤖' : '👤'}</div>
    <div class="msg-bubble">${formatText(text)}</div>`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  chatEmpty.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'chat-msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar ai-av">🤖</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || sendBtn.disabled) return;
  if (!apiKey) {
    alert('APIキーが設定されていません。管理者設定ページでAPIキーを登録してください。');
    return;
  }

  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;
  history.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: systemPrompt,
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `APIエラー: ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('ai', reply);
  } catch (err) {
    removeTyping();
    addMessage('ai', `⚠️ エラーが発生しました: ${err.message}\n\nAPIキーが正しいか確認してください。`);
    history.pop();
  }

  sendBtn.disabled = false;
  chatInput.focus();
}

// 送信
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

// リセット
document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('会話履歴をリセットしますか？')) {
    history = [];
    chatWindow.innerHTML = '';
    chatWindow.appendChild(chatEmpty);
    chatEmpty.style.display = 'block';
  }
});

// ハンバーガー
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('logoutBtn').addEventListener('click', async () => { await logout(); });
</script>
</body>
</html>
